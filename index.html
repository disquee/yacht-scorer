<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disqo's Yacht Game v5</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>DISQO'S YACHT GAME <small>v5</small></h1>
        <div class="controls" id="header-controls" style="display: none;">
            <button id="toggle-opt-btn" onclick="toggleOptimizer()">Opt: ON</button>
            <button id="reset-btn" onclick="location.reload()">RESET</button>
        </div>
    </header>

    <main>
        <div id="setup-container"></div>

        <div id="game-container" style="display: none;">
            <div id="sticky-hud">
                <div class="dice-container" id="dice-hud">
                    <div class="dice-display">
                        <div id="die-0" class="die" onclick="toggleHold(0)">-</div>
                        <div id="die-1" class="die" onclick="toggleHold(1)">-</div>
                        <div id="die-2" class="die" onclick="toggleHold(2)">-</div>
                        <div id="die-3" class="die" onclick="toggleHold(3)">-</div>
                        <div id="die-4" class="die" onclick="toggleHold(4)">-</div>
                    </div>
                    <div class="dice-controls">
                        <div class="dice-button-row">
                            <button id="roll-btn">ROLL DICE</button>
                            <button id="view-toggle" onclick="toggleDiceView()">VIEW: DICE</button>
                        </div>
                        <div id="rolls-left" class="round-status">ROUND: 1/13 | ROLLS LEFT: 3</div>
                    </div>
                </div>
                <div id="status-bar" class="status-bar" style="display: none;">ROLL DICE TO ADD SCORE!</div>
                
                <table class="header-table">
                    <thead id="table-head"></thead>
                </table>
            </div>

            <div class="table-container">
                <table id="score-table">
                    <tbody id="table-body"></tbody>
                </table>
            </div>
        </div>
    </main>
    <script src="app-v5.js"></script>
</body>
</html>
